<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Mining Game</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 2px solid white;
        }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: white;
            box-shadow:
                0 -6px 0 white,
                0 6px 0 white,
                -6px 0 0 white,
                6px 0 0 white,
                0 -12px 0 white,
                0 12px 0 white,
                -12px 0 0 white,
                12px 0 0 white;
            transform: translate(-50%, -50%);
            opacity: 80%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="game.js"></script>

    <div id="crosshair"></div>
</body>
</html>
